description: >-
  CNO Financial Group is an Indiana-based insurance holding company that
  develops, markets, and administers life and health insurance, annuities,
  and workforce benefits solutions through brands including Bankers Life,
  Colonial Penn, Washington National, Optavise, and PMA USA. CNO does not
  publish a public-facing developer portal or API; integrations are run via
  partner channels (CRM, Pega Cloud platform, and brand-specific producer
  portals).
